<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>CVPortaal - Generator</title>
    <style>
        /* Basis reset voor een strakke weergave zonder ongewenste marges */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* De hoofdcontainer die het hele scherm vult en in tweeën deelt */
        .container {
            display: flex;
            height: 100vh; /* 100% van de schermhoogte */
        }

        /* De linkerkant voor de invoervelden en knoppen */
        .linkerkolom {
            width: 50%;
            padding: 30px;
            background-color: #ffffff;
            overflow-y: auto; /* Zorgt voor een scrollbalk als het formulier lang wordt */
        }

        /* De rechterkant voor de blauwe achtergrond en de cv-weergave */
        .rechterkolom {
            width: 50%;
            padding: 40px;
            background-color: #4A90E2; /* De kenmerkende blauwe kleur */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Het witte A4-tje (het cv zelf) in de rechterkolom */
        .cv-papier {
            width: 100%;
            max-width: 210mm; /* Standaard A4 breedte */
            height: 297mm; /* Standaard A4 hoogte */
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            padding: 40px;
            overflow: hidden; /* Houdt de inhoud netjes binnen het papier */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Linkerkant: Hier programmeren we later het invoerformulier -->
        <div class="linkerkolom">
            <h2>Kies je cv variant</h2>
            <br>
            <p>Hier komen de invulvelden voor de persoonsgegevens, werkervaring en opleidingen.</p>
        </div>

        <!-- Rechterkant: Hier komt de live weergave van het cv -->
        <div class="rechterkolom">
            <div class="cv-papier">
                <h2>Ewout</h2>
                <hr>
                <br>
                <p>Dit is de weergave van het cv. Straks vullen we dit automatisch in met de data uit de linkerkolom.</p>
            </div>
        </div>
    </div>

    <!-- Onze database koppeling blijft onzichtbaar op de achtergrond meedraaien -->
    <script type="module">
        import { slaGegevensOp } from './databaseService.js';
        console.log("De interface is geladen en de database service staat klaar.");
    </script>

</body>
</html>
