<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>CVPortaal - Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="linkerkolom">
            
            <h2 class="hoofdtitel">Kies je cv variant</h2>
            <div class="varianten-grid">
                <div class="variant-kaart actief">Elin Baanzicht<br>(Basis)</div>
                <div class="variant-kaart">Klassiek<br>(Zonder Balk)</div>
                <div class="variant-kaart">Modern<br>(Gekleurd)</div>
            </div>

            <p style="font-size: 13px; font-weight:600; color:#718096; margin-bottom:8px;">Kies je kleur</p>
            <div class="kleur-kiezer">
                <div class="kleur-rondje actief" style="background-color: #4A90E2;"></div>
                <div class="kleur-rondje" style="background-color: #E24A4A;"></div>
                <div class="kleur-rondje" style="background-color: #2ECC71;"></div>
                <div class="kleur-rondje" style="background-color: #9B59B6;"></div>
                <div class="kleur-rondje" style="background-color: #F1C40F;"></div>
                <div class="kleur-rondje" style="background-color: #E67E22;"></div>
                <div class="kleur-rondje" style="background-color: #FF85A2;"></div>
                <div class="kleur-rondje" style="background-color: #1ABC9C;"></div>
                <div class="kleur-rondje" style="background-color: #34495E;"></div>
            </div>

            <h2 class="hoofdtitel">Kies je cv onderdelen</h2>
            <div class="onderdelen-grid">
                <button class="onderdeel-knop">Mijn sterke punten</button>
                <button class="onderdeel-knop">Waar heb ik gewerkt?</button>
                <button class="onderdeel-knop">Welke opleidingen of cursus heb ik gedaan?</button>
                <button class="onderdeel-knop">Talen die ik spreek</button>
                <button class="onderdeel-knop">Dit vind ik leuk</button>
                <button class="onderdeel-knop">Meer over mij</button>
            </div>

            <h3 class="sectie-titel">Mijn Gegevens</h3>
            
            <div class="form-groep">
                <label for="voornaam">Voornaam</label>
                <input type="text" id="voornaam" placeholder="Bijv. Elin">
            </div>

            <div class="form-groep">
                <label for="achternaam">Achternaam</label>
                <input type="text" id="achternaam" placeholder="Bijv. Baanzicht">
            </div>

            <div class="form-groep">
                <label for="adres">Adres</label>
                <input type="text" id="adres" placeholder="Straat en huisnummer">
            </div>

            <div class="form-groep">
                <label for="postcode">Postcode en Plaats</label>
                <input type="text" id="postcode" placeholder="Bijv. 1234 AB Amsterdam">
            </div>

            <div class="form-groep">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="jouwadres@mail.com">
            </div>

            <div class="form-groep">
                <label for="telefoon">Telefoon</label>
                <input type="tel" id="telefoon" placeholder="06 - 12345678">
            </div>

            <h3 class="sectie-titel">Dit ben ik</h3>

            <div class="form-groep">
                <label for="profieltekst">Vertel iets over jezelf</label>
                <textarea id="profieltekst" rows="5" placeholder="Ik ben een enthousiaste werknemer..."></textarea>
            </div>
        </div>

        <div class="rechterkolom">
            <div class="cv-papier">
                <h2><span id="weergave-voornaam">Ewout</span> <span id="weergave-achternaam"></span></h2>
                <p style="margin-top: 5px;">
                    <small style="color: #718096;">
                        <span id="weergave-adres">Jouw adres</span> | 
                        <span id="weergave-postcode">Postcode & Plaats</span> | 
                        <span id="weergave-email">E-mailadres</span> | 
                        <span id="weergave-telefoon">Telefoonnummer</span>
                    </small>
                </p>
                <hr style="margin: 20px 0; border: none; border-top: 1px solid #e2e8f0;">
                
                <h4 style="color: #4A90E2; margin-bottom: 8px; font-size: 13px; letter-spacing: 0.5px;">PROFIEL</h4>
                <p id="weergave-profieltekst" style="font-size: 14px; line-height: 1.6; color: #4a5568;">
                    Hier verschijnt straks automatisch jouw profieltekst...
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { slaGegevensOp } from './databaseService.js';
        console.log("CVPortaal interface met premium look & feel geladen.");
    </script>
    <script src="script.js"></script>
</body>
</html>
